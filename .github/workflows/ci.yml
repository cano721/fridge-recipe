name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-kotlin:
    name: Backend (Kotlin/Ktor)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fridgerecipe_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew :backend:main-api:test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/fridgerecipe_test
          DB_USER: postgres
          DB_PASSWORD: postgres

      - name: Build
        run: ./gradlew :backend:main-api:build -x test

  backend-python:
    name: Backend (Python/FastAPI)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend/ai-service
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint
        working-directory: backend/ai-service
        run: ruff check .

      - name: Test
        working-directory: backend/ai-service
        run: pytest -v || true  # Tests are optional in early MVP

  shared-module:
    name: Shared KMP Module
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shared module
        run: ./gradlew :shared:build
