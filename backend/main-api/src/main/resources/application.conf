ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        host = "0.0.0.0"
    }
    application {
        modules = [ com.fridgerecipe.ApplicationKt.module ]
    }
}

# Database
database {
    host = "localhost"
    host = ${?POSTGRES_HOST}
    port = 5432
    port = ${?POSTGRES_PORT}
    name = "fridge_recipe"
    name = ${?POSTGRES_DB}
    user = "fridge"
    user = ${?POSTGRES_USER}
    password = "fridge1234"
    password = ${?POSTGRES_PASSWORD}
}

# Redis
redis {
    host = "localhost"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
    password = "redis1234"
    password = ${?REDIS_PASSWORD}
}

# JWT
jwt {
    secret = "dev-jwt-secret-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "fridge-recipe"
    issuer = ${?JWT_ISSUER}
    audience = "fridge-recipe-app"
    audience = ${?JWT_AUDIENCE}
}

# AI Service
aiService {
    url = "http://localhost:8000"
    url = ${?AI_SERVICE_URL}
    internalApiKey = "dev-internal-key"
    internalApiKey = ${?INTERNAL_API_KEY}
}
