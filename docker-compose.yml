version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fridge-recipe-db
    environment:
      POSTGRES_DB: fridgerecipe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/main-api/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fridge-recipe-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  main-api:
    build:
      context: .
      dockerfile: backend/main-api/Dockerfile
    container_name: fridge-recipe-api
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fridgerecipe
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_API_KEY: dev-internal-key
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: backend/ai-service
      dockerfile: Dockerfile
    container_name: fridge-recipe-ai
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fridgerecipe
      REDIS_URL: redis://redis:6379/0
      INTERNAL_API_KEY: dev-internal-key
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLOVA_OCR_API_URL: ${CLOVA_OCR_API_URL:-}
      CLOVA_OCR_SECRET_KEY: ${CLOVA_OCR_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: backend/ai-service
      dockerfile: Dockerfile
    container_name: fridge-recipe-celery
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fridgerecipe
      REDIS_URL: redis://redis:6379/0
      INTERNAL_API_KEY: dev-internal-key
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLOVA_OCR_API_URL: ${CLOVA_OCR_API_URL:-}
      CLOVA_OCR_SECRET_KEY: ${CLOVA_OCR_SECRET_KEY:-}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
