services:
  postgres:
    image: postgres:16-alpine
    container_name: fridge-recipe-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fridge_recipe}
      POSTGRES_USER: ${POSTGRES_USER:-fridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fridge1234}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fridge} -d ${POSTGRES_DB:-fridge_recipe}"]
      interval: 10s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10-alpine
    container_name: fridge-recipe-flyway
    command: -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fridge_recipe} -user=${POSTGRES_USER:-fridge} -password=${POSTGRES_PASSWORD:-fridge1234} -locations=filesystem:/flyway/sql/migration,filesystem:/flyway/sql/seed migrate
    volumes:
      - ./db/migration:/flyway/sql/migration
      - ./db/seed:/flyway/sql/seed
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: fridge-recipe-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis1234}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis1234}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: fridge-recipe-web
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - redis

  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    container_name: fridge-recipe-ai
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis1234}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis1234}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis1234}@redis:6379/1
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    container_name: fridge-recipe-celery
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis1234}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis1234}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis1234}@redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
